name: Docker build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read OPENCLAW_VERSION from railway.toml
        id: openclaw_version
        shell: bash
        run: |
          version=$(grep '^OPENCLAW_VERSION = ' railway.toml | sed -E 's/OPENCLAW_VERSION = "([^"]+)"/\1/')
          test -n "$version"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build only (no push). If this fails, the PR breaks container builds.
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: openclaw-railway-template:ci
          build-args: |
            OPENCLAW_VERSION=${{ steps.openclaw_version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
